[package]
name = "rpki"
description = "RPKI: Parallel Tensor Watermarking and Pathogen Isolation Protocol [RFC-003]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://rpki.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-003-RPKI-IMMUNITY.md"
keywords = ["sovereign-ai", "zero-trust", "tensor-watermarking", "rfc-003", "pathogen-isolation"]
categories = ["cryptography", "network-programming", "security", "hardware-acceleration"]
rust-version = "1.75"

[dependencies]
# --- Core Organism Linking ---
# RPKI inspects the Neural Spine (RTTP) in-band.
rttp = { workspace = true }

# --- Parallel Immune Pipeline ---
# SIMD-level acceleration for sub-300µs pathogen detection.
rayon = { workspace = true }
crossbeam = { workspace = true }
crossbeam-channel = { workspace = true }
parking_lot = { workspace = true } # High-concurrency immune triage

# --- Cryptographic DNA (Zero-Trust Provenance) ---
# High-performance hashing and steganography engines for the Data Soul.
sha2 = { workspace = true }        # Merkle-DAG chain integrity
ring = { workspace = true }        # Hardware-native cryptographic primitives
zeroize = { workspace = true, features = ["derive"] } # Secure credential clearing

# --- Diagnostics & Logic ---
serde = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
tracing = { workspace = true }     # Real-time pathogen isolation audit trails
once_cell = { workspace = true }

[dev-dependencies]
# Benchmarking for 300µs quarantine latency targets
criterion = { workspace = true }
